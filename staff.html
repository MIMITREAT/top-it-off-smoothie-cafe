<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Staff — What's Scooping Today | Top it off</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap">
  <style>
    :root{
      --green:#14502e; --green-mid:#1f6e40; --accent:#e8197d; --accent-dark:#c0125f;
      --leaf:#6fbf44; --bg:#f4f8f1; --card:#fff; --border:#dfe7d9; --muted:#5b675e;
      --ink:#14241a; --ok:#2f9e44; --err:#d6336c; --radius:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Poppins',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:48px;}
    .topbar{background:var(--green);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
    .topbar-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
    .topbar-title em{color:var(--accent);font-style:normal;}
    .topbar-sub{font-size:11px;opacity:.8;margin-left:auto;}
    .wrap{max-width:520px;margin:0 auto;padding:24px 16px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
    .card-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--green);margin-bottom:4px;}
    .card-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}
    .note{background:#fff8ec;border:1px solid #f0e2c2;color:#8a6d1a;font-size:12.5px;padding:10px 12px;border-radius:10px;margin-bottom:16px;}
    label{display:block;font-size:13px;font-weight:600;color:var(--green);margin-bottom:6px;margin-top:12px;}
    label:first-of-type{margin-top:0;}
    input[type=text]{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;background:#fdfffb;}
    input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,25,125,.12);}
    .row{display:flex;gap:8px;}
    .row input{flex:1;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:100px;font-family:inherit;font-weight:600;font-size:15px;padding:12px 20px;cursor:pointer;transition:background .2s,transform .1s;}
    .btn:active{transform:translateY(1px);}
    .btn--primary{background:var(--accent);color:#fff;width:100%;}
    .btn--primary:hover{background:var(--accent-dark);}
    .btn--ghost{background:#eef3ea;color:var(--green);}
    .btn--sm{padding:9px 14px;font-size:14px;}
    .items{list-style:none;margin:14px 0 0;display:flex;flex-direction:column;gap:8px;}
    .item{display:flex;align-items:center;gap:10px;background:#f7faf4;border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
    .item-name{flex:1;font-weight:500;}
    .item-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#fff;background:var(--accent);padding:2px 8px;border-radius:100px;}
    .item-del{background:none;border:none;color:var(--err);font-size:20px;line-height:1;cursor:pointer;padding:0 4px;}
    .preset-label{font-size:12px;color:var(--muted);margin:14px 0 8px;}
    .presets{display:flex;flex-wrap:wrap;gap:6px;}
    .preset{background:#eef3ea;border:1px solid var(--border);border-radius:100px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--green);}
    .preset:hover{background:var(--leaf);color:#fff;border-color:var(--leaf);}
    .msg{font-size:14px;margin-top:12px;min-height:1.2em;text-align:center;}
    .msg.ok{color:var(--ok);} .msg.err{color:var(--err);}
    .meta{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;}
    .count{font-size:12px;color:var(--muted);margin-top:8px;}
    .backlink{display:inline-block;margin-top:8px;font-size:13px;color:var(--accent);text-decoration:underline;}
  </style>
</head>
<body>
  <div class="topbar">
    <span aria-hidden="true">🍦</span>
    <span class="topbar-title">Top <em>it</em> off · Staff</span>
    <span class="topbar-sub">Flavor Board</span>
  </div>

  <div class="wrap">
    <div class="card" id="editor-card">
      <p class="note">PIN sign-in is turned off for now — anyone with this link can update the board. Sign-in can be added later.</p>
      <h2 class="card-title">What's Scooping Today</h2>
      <p class="card-sub">Add the Mimi's ice cream flavors available today, then publish to the homepage board.</p>

      <label for="i-name">Add a flavor</label>
      <div class="row">
        <input type="text" id="i-name" placeholder="Flavor name">
        <input type="text" id="i-tag" style="max-width:120px;" placeholder="Tag (opt)">
      </div>
      <button class="btn btn--ghost btn--sm" style="margin-top:8px;" id="add-btn">+ Add to board</button>

      <p class="preset-label">Quick add common flavors:</p>
      <div class="presets" id="presets"></div>

      <ul class="items" id="items"></ul>
      <p class="count" id="count"></p>

      <label for="s-name" style="margin-top:18px;">Your name (optional)</label>
      <input type="text" id="s-name" autocomplete="off" placeholder="e.g. Sam">

      <button class="btn btn--primary" style="margin-top:16px;" id="publish-btn">Publish today's board</button>
      <p class="msg" id="pub-msg" role="status"></p>
      <p class="meta" id="meta"></p>
      <a href="index.html" class="backlink">← Back to site</a>
    </div>
  </div>

  <script>
  (function(){
    var board = [];
    var PRESETS = ['Vanilla Bean','Chocolate','Strawberry','Rainbow Sherbet','Cookies & Cream','Mint Chip','Salted Caramel','Black Cherry','Toasted Marshmallow','Butterfinger','Peanut Butter','Blueberry','Cookie Dough','Lemon Cookie'];

    var $ = function(id){ return document.getElementById(id); };
    function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }

    function renderItems(){
      var ul = $('items'); ul.innerHTML = '';
      board.forEach(function(it, idx){
        var li = document.createElement('li'); li.className='item';
        li.innerHTML = '<span class="item-name">'+esc(it.name)+'</span>' +
          (it.tag ? '<span class="item-tag">'+esc(it.tag)+'</span>' : '') +
          '<button class="item-del" aria-label="Remove" data-i="'+idx+'">&times;</button>';
        ul.appendChild(li);
      });
      $('count').textContent = board.length + ' flavor' + (board.length===1?'':'s') + ' on the board';
    }

    function renderPresets(){
      var box = $('presets'); box.innerHTML = '';
      PRESETS.forEach(function(name){
        var b = document.createElement('button'); b.className='preset'; b.type='button'; b.textContent=name;
        b.onclick = function(){ addItem(name,''); };
        box.appendChild(b);
      });
    }

    function addItem(name, tag){
      name = (name||'').trim(); if(!name) return;
      if(board.some(function(it){return it.name.toLowerCase()===name.toLowerCase();})) return;
      board.push({ name:name, tag:(tag||'').trim() });
      renderItems();
    }

    $('items').addEventListener('click', function(e){
      var b = e.target.closest('.item-del'); if(!b) return;
      board.splice(parseInt(b.dataset.i,10),1); renderItems();
    });

    $('add-btn').onclick = function(){
      addItem($('i-name').value, $('i-tag').value);
      $('i-name').value=''; $('i-tag').value=''; $('i-name').focus();
    };
    $('i-name').addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); $('add-btn').click(); } });

    function loadCurrent(){
      fetch('/api/flavors-get',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
        if(d && d.ok && Array.isArray(d.items) && d.items.length){ board = d.items.slice(); renderItems(); }
        if(d && d.updatedAt){ $('meta').textContent = 'Last updated '+d.updatedAt+(d.updatedBy?(' by '+d.updatedBy):''); }
      }).catch(function(){});
    }

    $('publish-btn').onclick = function(){
      var m = $('pub-msg');
      if(!board.length){ m.textContent='Add at least one flavor first.'; m.className='msg err'; return; }
      m.textContent='Publishing…'; m.className='msg';
      fetch('/api/flavors-set',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name: $('s-name').value.trim(), items: board })
      }).then(function(r){return r.json();}).then(function(d){
        if(d && d.ok){
          m.textContent='✓ Board published! ('+d.count+' flavors)'; m.className='msg ok';
          $('meta').textContent='Last updated '+d.updatedAt+' by '+d.updatedBy;
        } else {
          m.textContent = (d && d.error) ? d.error : 'Could not publish.'; m.className='msg err';
        }
      }).catch(function(){ m.textContent='Network error — try again.'; m.className='msg err'; });
    };

    renderPresets();
    loadCurrent();
  })();
  </script>
</body>
</html>
